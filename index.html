<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Grup d'Habitatge de Sants (GHAS). Defensem el dret a l'habitatge digne al barri de Sants, Barcelona.">
  <meta name="theme-color" content="#000000">
  <!-- Open Graph -->
  <meta property="og:title"       content="GHAS — Grup d'Habitatge de Sants">
  <meta property="og:description" content="Defensem el dret a l'habitatge digne. Cap desnonament sense resposta.">
  <meta property="og:type"        content="website">
  <meta property="og:image"       content="assets/og-image.jpg">
  
  <title>GHAS — Grup d'Habitatge de Sants</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- ── Avís de connexió ──────────────────────────────────── -->
  <div id="connection-warning" role="alert" aria-live="polite"></div>

  <!-- ── HEADER ────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="container">
      <div class="header-inner">
        <a href="#hero" class="site-logo" aria-label="GHAS - Inici">
          <img src="logo.png" alt="Grup d'Habitatge de Sants">
        </a>

        <button
          class="menu-toggle"
          id="menu-toggle"
          aria-label="Obrir menú"
          aria-expanded="false"
          aria-controls="main-nav"
        >☰</button>
        <button id="theme-toggle">
          🌙☀️
        </button>
        
        <nav class="main-nav" id="main-nav" aria-label="Navegació principal">
          <ul class="nav__list">
            <li>
              <a href="#events" class="nav__link">
                Accions
                <span class="nav-badge" id="events-count" aria-label="accions pendents"></span>
              </a>
            </li>
            <li><a href="#news"    class="nav__link">Notícies</a></li>
            <li><a href="#about"   class="nav__link">Qui som</a></li>
            <li><a href="#contact" class="nav__link">Contacte</a></li>
            <li>
              <a href="#contact" class="nav__link" style="background:var(--red); color:var(--black);">
                UNEIX-TE
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <!-- ── ALERT TICKER ──────────────────────────────────────── -->
  <div class="alert-bar" role="marquee" aria-label="Pròximes accions">
    <div class="alert-label">⚡ ACCIONS</div>
    <div class="alert-ticker-wrap">
      <div id="alert-ticker"></div>
    </div>
  </div>

  <main>

    <!-- ── HERO ──────────────────────────────────────────── -->
    <section id="hero" aria-label="Portada">
      <!-- Text de fons decoratiu -->
      <div class="hero-bg-text" aria-hidden="true">
        <span>GHAS</span>
      </div>

      <div class="hero-content container">
        <div>
          <p class="hero-eyebrow">Grup d'Habitatge de Sants · Barcelona</p>

          <h1 class="hero-claim">
            Casa per<br>
            <em>viure.</em><br>
            No per<br>especular.
          </h1>

  <!-- ── JS (mòduls) ────────────────────────────────────────── -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
